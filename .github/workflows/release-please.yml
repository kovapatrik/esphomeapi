name: Release Please

on:
  push:
    branches:
      - main

# Intentionally no permissions block — we use RELEASE_TOKEN (a PAT) so that
# releases created by this workflow trigger release.yml. Releases created with
# GITHUB_TOKEN do not trigger other workflows (GitHub limitation).

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.RELEASE_TOKEN }}
